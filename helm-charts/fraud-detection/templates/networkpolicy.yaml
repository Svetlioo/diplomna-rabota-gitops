apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "fraud-detection.fullname" . }}-allow-bank-service
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fraud-detection.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: bank-service
      ports:
        - protocol: TCP
          port: 8000
