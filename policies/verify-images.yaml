apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
  annotations:
    policies.kyverno.io/title: Verify Image Signatures
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      All container images pulled from ghcr.io/svetlioo/* into the application
      namespaces (dev, test, prod) must carry a valid Cosign keyless signature
      produced by the project's GitHub Actions CI workflow. Unsigned images
      and images signed by any other identity are rejected at admission.
spec:
  admission: true
  background: false
  emitWarning: false
  validationFailureAction: Enforce
  webhookConfiguration:
    failurePolicy: Fail
  rules:
    - name: verify-ghcr-signatures
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - dev
                - test
                - prod
      verifyImages:
        - imageReferences:
            - "ghcr.io/svetlioo/*"
          mutateDigest: true
          verifyDigest: true
          required: true
          useCache: true
          attestors:
            - entries:
                - keyless:
                    subjectRegExp: "^https://github\\.com/Svetlioo/diplomna-rabota/\\.github/workflows/account-service-ci\\.yml@refs/heads/.+$"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
                  signatureAlgorithm: sha256
