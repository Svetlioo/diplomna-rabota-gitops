apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
  annotations:
    policies.kyverno.io/title: Verify Image Signatures and Attestations
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      All container images pulled from ghcr.io/svetlioo/* into the application
      namespaces (dev, test, prod) must carry a valid Cosign keyless signature
      from the project's CI, plus a CycloneDX SBOM attestation (signed by the CI)
      and an SLSA provenance attestation (signed by the slsa-github-generator).
      Images that are unsigned, signed by another identity, or missing either
      attestation are rejected at admission.
spec:
  admission: true
  background: false
  emitWarning: false
  validationFailureAction: Enforce
  webhookConfiguration:
    failurePolicy: Fail
  rules:
    - name: verify-ghcr-signatures
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - dev
                - test
                - prod
      verifyImages:
        - imageReferences:
            - "ghcr.io/svetlioo/*"
          mutateDigest: true
          verifyDigest: true
          required: true
          useCache: true
          attestors:
            - entries:
                - keyless:
                    subjectRegExp: "^https://github\\.com/Svetlioo/diplomna-rabota/\\.github/workflows/[^/]+\\.yml@refs/heads/.+$"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
                  signatureAlgorithm: sha256
          attestations:
            - type: https://slsa.dev/provenance/v0.2
              attestors:
                - entries:
                    - keyless:
                        subjectRegExp: "^https://github\\.com/slsa-framework/slsa-github-generator/\\.github/workflows/generator_container_slsa3\\.yml@refs/tags/.+$"
                        issuer: "https://token.actions.githubusercontent.com"
                        rekor:
                          url: https://rekor.sigstore.dev
            - type: https://cyclonedx.org/bom
              attestors:
                - entries:
                    - keyless:
                        subjectRegExp: "^https://github\\.com/Svetlioo/diplomna-rabota/\\.github/workflows/[^/]+\\.yml@refs/heads/.+$"
                        issuer: "https://token.actions.githubusercontent.com"
                        rekor:
                          url: https://rekor.sigstore.dev
