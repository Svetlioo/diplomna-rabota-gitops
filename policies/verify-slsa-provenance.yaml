apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-slsa-provenance-keyless
  annotations:
    policies.kyverno.io/title: Verify SLSA Provenance (Keyless)
    policies.kyverno.io/category: Software Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Images pulled from ghcr.io/svetlioo/* into the application namespaces must carry
      SLSA provenance produced and signed by the project's slsa-github-generator
      workflow. Pods whose images lack verifiable provenance are rejected at admission.
spec:
  admission: true
  background: false
  emitWarning: false
  validationFailureAction: Enforce
  webhookTimeoutSeconds: 30
  webhookConfiguration:
    failurePolicy: Fail
  rules:
    - name: check-slsa-keyless
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - dev
                - test
                - prod
      verifyImages:
        - imageReferences:
            - "ghcr.io/svetlioo/*"
          mutateDigest: true
          verifyDigest: true
          required: true
          useCache: true
          attestations:
            - predicateType: https://slsa.dev/provenance/v0.2
              attestors:
                - count: 1
                  entries:
                    - keyless:
                        subject: "https://github.com/slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@refs/tags/v*"
                        issuer: "https://token.actions.githubusercontent.com"
                        rekor:
                          url: https://rekor.sigstore.dev
                      signatureAlgorithm: sha256
              conditions:
                - all:
                    - key: "{{ regex_match('^https://github.com/slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@refs/tags/v[0-9].[0-9].[0-9]$','{{ builder.id}}') }}"
                      operator: Equals
                      value: true
