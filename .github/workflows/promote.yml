name: Promote image

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service to promote
        type: choice
        options: [bank, fraud]
        required: true
      target:
        description: Target environment
        type: choice
        options: [test, prod]
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    name: Promote
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SVC: ${{ inputs.service }}
      TARGET: ${{ inputs.target }}
      BRANCH: promote/${{ inputs.service }}-${{ inputs.target }}-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Resolve source environment
        run: |
          if [ "$TARGET" = "test" ]; then
            echo "SOURCE=dev" >> "$GITHUB_ENV"
          else
            echo "SOURCE=test" >> "$GITHUB_ENV"
          fi

      - name: Read source image
        run: |
          echo "TAG=$(yq '.image.tag' "environments/$SOURCE/values-$SVC.yaml")" >> "$GITHUB_ENV"
          echo "DIGEST=$(yq '.image.digest' "environments/$SOURCE/values-$SVC.yaml")" >> "$GITHUB_ENV"

      - name: Update target image
        run: yq -i '.image.tag = strenv(TAG) | .image.digest = strenv(DIGEST)' "environments/$TARGET/values-$SVC.yaml"

      - name: Open promotion PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git commit -am "promote($TARGET): $SVC $TAG"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "promote($TARGET): $SVC $TAG" \
            --body "Promote $SVC from $SOURCE to $TARGET (image $TAG)."
