name: Promote image

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service(s) to promote
        type: choice
        options: [bank, fraud, both]
        required: true
      target:
        description: Target environment
        type: choice
        options: [test, prod]
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    name: Promote
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SERVICE: ${{ inputs.service }}
      TARGET: ${{ inputs.target }}
      BRANCH: promote/${{ inputs.service }}-${{ inputs.target }}-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Resolve source environment
        run: |
          if [ "$TARGET" = "test" ]; then
            echo "SOURCE=dev" >> "$GITHUB_ENV"
          else
            echo "SOURCE=test" >> "$GITHUB_ENV"
          fi

      - name: Copy image(s) from source to target
        run: |
          if [ "$SERVICE" = "both" ]; then SERVICES="bank fraud"; else SERVICES="$SERVICE"; fi
          for SVC in $SERVICES; do
            export TAG=$(yq '.image.tag' "environments/$SOURCE/values-$SVC.yaml")
            export DIGEST=$(yq '.image.digest' "environments/$SOURCE/values-$SVC.yaml")
            yq -i '.image.tag = strenv(TAG) | .image.digest = strenv(DIGEST)' "environments/$TARGET/values-$SVC.yaml"
          done

      - name: Open promotion PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add environments/
          git commit -m "promote($TARGET): $SERVICE"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "promote($TARGET): $SERVICE" \
            --body "Promote $SERVICE from $SOURCE to $TARGET."
