name: Promote image

on:
  workflow_dispatch:
    inputs:
      bank:
        description: Promote bank-service
        type: boolean
        default: false
      fraud:
        description: Promote fraud-detection
        type: boolean
        default: false
      frontend:
        description: Promote frontend
        type: boolean
        default: false
      path:
        description: Promotion path (source to target)
        type: choice
        options:
          - dev-to-test
          - test-to-prod
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    name: Promote
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
      PATH_INPUT: ${{ inputs.path }}
      BANK: ${{ inputs.bank }}
      FRAUD: ${{ inputs.fraud }}
      FRONTEND: ${{ inputs.frontend }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Resolve services and path
        run: |
          SERVICES=""
          if [ "$BANK" = "true" ]; then SERVICES="$SERVICES bank"; fi
          if [ "$FRAUD" = "true" ]; then SERVICES="$SERVICES fraud"; fi
          if [ "$FRONTEND" = "true" ]; then SERVICES="$SERVICES frontend"; fi
          SERVICES="$(echo "$SERVICES" | xargs)"
          if [ -z "$SERVICES" ]; then
            echo "No service selected. Tick at least one (bank, fraud, frontend)." >&2
            exit 1
          fi
          echo "SERVICES=$SERVICES" >> "$GITHUB_ENV"
          echo "LABEL=$(echo "$SERVICES" | tr ' ' '+')" >> "$GITHUB_ENV"
          echo "SOURCE=${PATH_INPUT%-to-*}" >> "$GITHUB_ENV"
          echo "TARGET=${PATH_INPUT#*-to-}" >> "$GITHUB_ENV"

      - name: Copy image(s) from source to target
        run: |
          for SVC in $SERVICES; do
            export TAG=$(yq '.image.tag' "environments/$SOURCE/values-$SVC.yaml")
            export DIGEST=$(yq '.image.digest' "environments/$SOURCE/values-$SVC.yaml")
            yq -i '.image.tag = strenv(TAG) | .image.digest = strenv(DIGEST)' "environments/$TARGET/values-$SVC.yaml"
          done

      - name: Open promotion PR
        run: |
          BRANCH="promote/$LABEL-$TARGET-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add environments/
          git commit -m "promote($TARGET): $SERVICES from $SOURCE"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "promote($TARGET): $LABEL from $SOURCE" \
            --body "Promote $SERVICES from $SOURCE to $TARGET."
